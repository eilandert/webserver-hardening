# =============================================================================
# pagespeed-main.conf  —  ngx_pagespeed global setup (http{} context).
#
#   http { ... include snippets/pagespeed-main.conf; }
#
# Needs the libnginx-mod-pagespeed module from the deb.myguard.nl stack
# (`load_module modules/ngx_pagespeed.so;` — usually auto-loaded by the package).
# Per-vhost filters live in snippets/pagespeed-site.conf.
#
# SECURITY: the PageSpeed admin/console/statistics handlers expose internals —
# they are NOT enabled here. If you turn them on, lock them to localhost/your
# admin CIDR with `pagespeed Allow` / a guarded location. PageSpeed rewrites
# inline some CSS/JS, which interacts with a strict Content-Security-Policy:
# either allow 'unsafe-inline' for style/script or skip the inline_* filters.
# =============================================================================

pagespeed on;

# corefilters = the safe, broadly-compatible set. Use OptimizeForBandwidth if
# you want byte savings without DOM-altering filters.
pagespeed RewriteLevel corefilters;

pagespeed PreserveUrlRelativity on;
pagespeed FetchHttps            enable;
pagespeed UseNativeFetcher      on;
pagespeed EnableCachePurge      on;

# Threads — scale to cores; expensive = image recompression etc.
pagespeed NumRewriteThreads          8;
pagespeed NumExpensiveRewriteThreads 8;

# File cache. Put it on tmpfs for best performance; size to taste. Must exist
# and be writable by the worker user. Can be swapped for memcached/redis:
#   https://www.modpagespeed.com/doc/system
pagespeed FileCachePath              "/var/cache/pagespeed/";
pagespeed FileCacheSizeKb            502400;
pagespeed FileCacheCleanIntervalMs   3600000;
pagespeed FileCacheInodeLimit        500000;
pagespeed DefaultSharedMemoryCacheKB 500000;

# Don't advertise the optimizer.
pagespeed XHeaderValue "";

# Admin/console handlers DISABLED by default (see SECURITY note above):
# pagespeed StatisticsPath   /ngx_pagespeed_statistics;
# pagespeed GlobalStatisticsPath /ngx_pagespeed_global_statistics;
# pagespeed MessagesPath     /ngx_pagespeed_message;
# pagespeed AdminPath        /pagespeed_admin;
