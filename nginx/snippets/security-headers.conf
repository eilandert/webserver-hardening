# =============================================================================
# security-headers.conf  —  baseline response headers for any web app.
#
#   include snippets/security-headers.conf;
#
# Put inside `server { ... }` (or a `location`). `always` makes the header ride
# on error responses too. The Content-Security-Policy here is intentionally
# strict — override it per app (Roundcube/ViMbAdmin need 'unsafe-inline'; see
# the example vhosts).
#
# NOTE on add_header inheritance: a child `location` that sets ANY add_header
# DROPS every add_header from the parent. If you add headers in a location,
# re-include this file there too.
# =============================================================================

# Stop MIME sniffing (drive-by content-type confusion attacks).
add_header X-Content-Type-Options    "nosniff"                          always;

# Clickjacking. SAMEORIGIN allows the app's own frames; use DENY if the app
# never frames itself.
add_header X-Frame-Options           "SAMEORIGIN"                       always;

# Leak only the origin cross-site, full URL same-origin.
add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;

# Legacy XSS auditor: explicitly OFF (the old filter caused bugs; CSP replaces it).
add_header X-XSS-Protection          "0"                                always;

# Drop ambient access to powerful browser features by default.
add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;

# Cross-origin isolation defaults — safe for first-party apps.
add_header Cross-Origin-Opener-Policy   "same-origin"  always;
add_header Cross-Origin-Resource-Policy "same-origin"  always;

# Content-Security-Policy: strict starting point. Tighten/loosen per app.
#   * no inline scripts/styles (add 'unsafe-inline' only if the app needs it)
#   * no plugins (object-src 'none'), no <base> hijack (base-uri 'self')
#   * no framing by others (frame-ancestors 'none' — matches XFO DENY apps)
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

# Never advertise the engine/version (also set `server_tokens off;` in http{}).
# more_clear_headers needs the headers-more module; server_tokens covers the rest.
# more_clear_headers Server;
