# =============================================================================
# vhost-vimbadmin.conf  —  hardened TLS vhost for ViMbAdmin (ZF1 mail admin).
#
# Positive-security model: one cheap classifier pass allows only known methods,
# routes and argument names to reach PHP — everything else is denied. This is a
# whitelist, not a blacklist, so unknown attack surface is closed by default.
#
# Pairs with the ViMbAdmin image: docker.io/eilandert/vimbadmin
# (source: https://github.com/eilandert/dockerized — src/vimbadmin/).
#
# --- http{} prerequisites ----------------------------------------------------
#   include snippets/realip.conf;
#   include snippets/bad-bots.conf;        # $hardening_bad_ua
#   limit_req_zone $binary_remote_addr zone=vimb_login:10m rate=12r/m;
#   limit_req_status 429;
#   # Method allowlist:
#   map $request_method $vimb_bad_method { default 1; GET 0; HEAD 0; POST 0; }
#   # Route allowlist (known controllers + ZF1 /key/value pairs + static + ACME):
#   map $uri $vimb_bad_route {
#       default 1;
#       "~^/$"                      0;
#       "~^/index\.php$"            0;
#       "~^/(?:additionalinfo|admin|alias|archive|auth|domain|error|exportsettings|index|log|mailbox|maintenance|mcp|queue)(?:/[a-z-]+(?:/[A-Za-z0-9._@%+-]+)*)?/?$" 0;
#       "~*\.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$" 0;
#       "~^/\.well-known/"          0;
#   }
#   upstream vimb_php { server unix:/run/php/vimbadmin-fpm.sock; }
# =============================================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vimbadmin.example.com;     # <-- your domain

    ssl_certificate     /etc/letsencrypt/live/vimbadmin.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vimbadmin.example.com/privkey.pem;
    include snippets/ssl.conf;

    root  /opt/vimbadmin/public;
    index index.php;

    client_max_body_size 16m;
    gzip off;                              # BREACH: secret-bearing dynamic HTML

    include snippets/security-headers.conf;
    add_header X-Frame-Options "DENY" always;   # ViMbAdmin never frames itself

    # ---- positive-security gate (cheapest denials first) ----
    if ($hardening_bad_ua) { return 444; }
    if ($vimb_bad_method)  { return 405; }
    location ^~ /.well-known/ { allow all; }
    if ($vimb_bad_route)   { return 404; }

    # ---- deny project internals (defence in depth) ----
    location ~ /\.(?!well-known) { deny all; }
    location ~* ^/(?:application|library|doctrine2|vendor|bin|var|tests)/ { deny all; }
    location ~* \.(?:ini|dist|sh|sql|log|orig|bak|swp|md)$ { deny all; }

    location ~* \.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$ {
        expires 7d; add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Auth endpoints: brute-force throttle (login/forgot POSTs only).
    location ~* ^/auth/(login|forgot) {
        limit_req zone=vimb_login burst=8 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Front controller — NOT rate-limited: ViMbAdmin funnels all dynamic
    # requests through index.php, so a limit here would throttle normal use.
    location = /index.php {
        include snippets/php-fpm.conf;
        fastcgi_param APPLICATION_ENV production;
        fastcgi_pass  vimb_php;
    }
    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include snippets/php-fpm.conf;
        fastcgi_pass vimb_php;
    }
}
