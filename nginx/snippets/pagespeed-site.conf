# =============================================================================
# pagespeed-site.conf  —  per-vhost ngx_pagespeed filters (server{} context).
#
#   server { ... include snippets/pagespeed-site.conf; }
#
# Requires snippets/pagespeed-main.conf in http{}. Curated filter set tuned for
# real apps (CSS/JS combine+minify, image recompression, cache extension).
# Drop filters that fight your app or CSP.
# =============================================================================

pagespeed on;

# Serve already-optimized resources straight from the pagespeed handler and
# don't let other add_header rules attach to them.
location ~ "\.pagespeed\.([a-z]\.)?[a-z]{2}\.[^.]{10}\.[^.]+" {
    add_header "" "";
    expires 1d;
}
location ~ "^/ngx_static/"   { expires 1d; }
location ~ "^/ngx_pagespeed$" { expires 1d; }

pagespeed PreserveUrlRelativity on;
pagespeed LowercaseHtmlNames     on;
pagespeed RespectVary            on;
pagespeed CombineAcrossPaths     on;

# ---- CSS ----
pagespeed EnableFilters  combine_css;
pagespeed EnableFilters  rewrite_css;
pagespeed EnableFilters  move_css_to_head;
pagespeed EnableFilters  move_css_above_scripts;
pagespeed EnableFilters  prioritize_critical_css;
pagespeed EnableFilters  flatten_css_imports;
pagespeed EnableFilters  inline_css;          # needs CSP 'unsafe-inline' for style-src
pagespeed DisableFilters outline_css;

# ---- JavaScript ----
pagespeed EnableFilters  combine_javascript;
pagespeed EnableFilters  rewrite_javascript;
pagespeed EnableFilters  canonicalize_javascript_libraries;
pagespeed DisableFilters defer_javascript;
pagespeed DisableFilters outline_javascript;

# ---- HTML ----
pagespeed EnableFilters  collapse_whitespace;
pagespeed EnableFilters  remove_comments;
pagespeed EnableFilters  remove_quotes;
pagespeed EnableFilters  elide_attributes;
pagespeed EnableFilters  combine_heads;
pagespeed EnableFilters  insert_dns_prefetch;
pagespeed EnableFilters  inline_import_to_link;
pagespeed EnableFilters  rewrite_style_attributes;
pagespeed EnableFilters  make_google_analytics_async;

# ---- Images ----
pagespeed EnableFilters  recompress_images;
pagespeed EnableFilters  strip_image_meta_data;
pagespeed EnableFilters  insert_image_dimensions;
pagespeed EnableFilters  inline_preview_images;
pagespeed DisableFilters lazyload_images;      # let the browser's native loading="lazy" handle it

# ---- Caching ----
pagespeed EnableFilters  extend_cache;
pagespeed EnableFilters  local_storage_cache;
pagespeed EnableFilters  in_place_optimize_for_browser;

# Shipped library canonicalization map (provided by the package):
# include /etc/nginx/snippets/pagespeed_libraries.conf;
