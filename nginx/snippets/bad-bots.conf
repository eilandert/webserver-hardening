# =============================================================================
# bad-bots.conf  —  cheap first-line gate against scanners, exploit bots and
#                   the new wave of vibe-coded AI exploit scanners.
#
# Two parts, two contexts:
#   1) the `map` blocks below go in the `http { }` context (they only DEFINE
#      variables, cost nothing until used);
#   2) the matching `if (...) return 444;` guards go at the TOP of each
#      `server { }` — see the example vhosts.
#
# Why: most automated abuse self-identifies (scanner UA) or omits a User-Agent
# entirely. Dropping those with 444 (close connection, no response) before any
# routing/PHP is the single cheapest win. Full rationale + the AI-bot angle:
#   https://deb.myguard.nl/2026/06/defend-webserver-vibe-coded-ai-exploit-scanners-bots/
#
# This is a coarse net. For request-level rules use ModSecurity + CRS (also in
# the deb.myguard.nl stack). For TLS-level bot identification see JA3/JA4
# fingerprinting (../patches/ssl-fingerprint.patch).
# =============================================================================

# ---- 1) classifiers — put in http{} ----------------------------------------

# Empty UA or known scanner/exploit/AI-crawler signatures → bad.
map $http_user_agent $hardening_bad_ua {
    default 0;
    ""      1;

    # security scanners / exploit frameworks
    "~*(?:nikto|sqlmap|nmap|masscan|nessus|openvas|acunetix|nuclei|wpscan|whatweb|dirbuster|gobuster|feroxbuster|ffuf|zgrab|zmeu|hydra|w3af|arachni|skipfish)" 1;

    # aggressive SEO / scraper bots (rarely wanted on an app backend)
    "~*(?:semrush|ahrefsbot|mj12bot|petalbot|dotbot|blexbot|dataforseo|serpstat|megaindex)" 1;

    # generic "I am a script" agents that hit apps looking for holes
    "~*(?:python-requests|python-urllib|go-http-client|libwww-perl|curl/|wget/|httpx|aiohttp|okhttp|java/|node-fetch|axios)" 1;

    # AI / LLM data + exploit crawlers (opt-out them at the app edge)
    "~*(?:GPTBot|ChatGPT-User|OAI-SearchBot|ClaudeBot|Claude-Web|anthropic-ai|CCBot|Google-Extended|Bytespider|Amazonbot|PerplexityBot|Diffbot|ImagesiftBot|Omgili|FriendlyCrawler)" 1;
}

# Requests for common exploit/probe paths → bad (drop before they reach the app).
map $request_uri $hardening_bad_uri {
    default 0;
    "~*\.(?:git|svn|hg|env|bak|old|sql|sqlite|db|log|ini|conf|key|pem|p12|pfx)(?:$|\?)" 1;
    "~*/(?:\.env|\.git|\.aws|\.ssh|wp-config\.php|config\.php|phpinfo|adminer|xmlrpc\.php|eval-stdin\.php|wlwmanifest)" 1;
    "~*/(?:vendor/phpunit|cgi-bin/|boaform|GponForm|HNAP1|currentsetting\.htm|setup\.cgi)" 1;
}

# ---- 2) usage — put at the top of each server{} ----------------------------
# (cheapest denial first; 444 = drop with no response, starves bot feedback)
#
#   if ($hardening_bad_ua)  { return 444; }
#   if ($hardening_bad_uri) { return 444; }
#
# Keep ACME reachable regardless:
#   location ^~ /.well-known/acme-challenge/ { allow all; }
