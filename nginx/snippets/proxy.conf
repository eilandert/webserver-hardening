# =============================================================================
# proxy.conf  —  reverse-proxy hardening for an upstream app (e.g. a Docker
#                container like Vaultwarden, listening on a private port).
#
#   location / {
#       include snippets/proxy.conf;
#       proxy_pass http://vaultwarden;   # define upstream in the vhost
#   }
#
# Forwards the real client identity, sets sane timeouts/buffers, and strips
# hop-by-hop junk. WebSocket upgrade is handled (needed by many SPA/realtime
# apps). Pair with snippets/realip.conf if THIS node is itself behind a proxy.
# =============================================================================

proxy_http_version 1.1;

# Pass the real client + scheme so the app sees the true origin, not nginx.
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# WebSocket / connection upgrade (no-op for plain HTTP requests).
# Requires the $connection_upgrade map from snippets/realip.conf (or http{}):
#   map $http_upgrade $connection_upgrade { default upgrade; "" close; }
proxy_set_header Upgrade           $http_upgrade;
proxy_set_header Connection        $connection_upgrade;

# Don't leak internal upstream identity to the client.
proxy_hide_header X-Powered-By;
proxy_hide_header Server;

# Timeouts — generous enough for slow apps, short enough to free workers.
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Buffering — keep on for throughput; raise buffers for chatty apps.
proxy_buffering       on;
proxy_buffers         16 16k;
proxy_buffer_size     16k;
proxy_busy_buffers_size 32k;

# Don't follow upstream redirects blindly; let the app own its Location.
proxy_redirect        off;
