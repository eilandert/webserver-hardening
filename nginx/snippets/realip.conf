# =============================================================================
# realip.conf  —  recover the real client IP when this node sits behind a
#                 trusted edge proxy / load balancer.
#
#   include snippets/realip.conf;   # in http{} (the map) and/or server{}
#
# Without this, $remote_addr is the PROXY's address, so rate limits, logs and
# the app's own brute-force tracking all key on one IP. Only trust private
# ranges (or your exact proxy IPs) — never trust X-Forwarded-For from the
# public internet, or clients can spoof their address.
#
# Needs the realip module (built into the deb.myguard.nl nginx/Angie packages;
# `nginx -V | grep http_realip_module` to confirm).
# =============================================================================

# WebSocket upgrade helper (used by snippets/proxy.conf). Safe to keep here.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

real_ip_header    X-Forwarded-For;
real_ip_recursive on;

# Trust private proxy ranges only. Replace with your proxy's exact IP/CIDR for
# a tighter trust boundary.
set_real_ip_from  10.0.0.0/8;
set_real_ip_from  172.16.0.0/12;
set_real_ip_from  192.168.0.0/16;
set_real_ip_from  fc00::/7;
set_real_ip_from  127.0.0.1;
set_real_ip_from  ::1;
