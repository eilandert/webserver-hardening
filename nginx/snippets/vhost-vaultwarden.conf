# =============================================================================
# vhost-vaultwarden.conf  —  hardened TLS reverse proxy to a Vaultwarden
#                            (Bitwarden-compatible) container.
#
# nginx terminates TLS and proxies to the container's HTTP port. WebSocket
# upgrade for live sync (/notifications/hub) is handled. The /admin panel is
# locked to a trusted CIDR — it is the highest-value target on the box.
#
# Pairs with a Vaultwarden container; front it with the same hardened stack as
# everything else: https://deb.myguard.nl/
#
# --- http{} prerequisites ----------------------------------------------------
#   include snippets/realip.conf;     # defines $connection_upgrade
#   include snippets/bad-bots.conf;   # $hardening_bad_ua / _uri
#   limit_req_zone $binary_remote_addr zone=vw_login:10m rate=30r/m;
#   limit_req_status 429;
#   upstream vaultwarden { server 127.0.0.1:8080; keepalive 16; }  # the container
# =============================================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vault.example.com;         # <-- your domain

    ssl_certificate     /etc/letsencrypt/live/vault.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vault.example.com/privkey.pem;
    include snippets/ssl.conf;

    # Vaultwarden handles large attachments + key blobs.
    client_max_body_size 525m;

    include snippets/security-headers.conf;
    # Web vault uses inline styles + WASM; relax CSP just enough.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

    # Drop scanners/empty-UA before proxying upstream.
    if ($hardening_bad_ua)  { return 444; }
    if ($hardening_bad_uri) { return 444; }

    # ---- admin panel: restrict to a trusted network ----
    # The single most attacked endpoint. Lock it to your admin CIDR/VPN and
    # rate-limit. Also set a strong ADMIN_TOKEN (argon2) in the container.
    location /admin {
        allow 10.0.0.0/8;                  # <-- your admin network / VPN
        allow 192.168.0.0/16;
        deny  all;
        limit_req zone=vw_login burst=10 nodelay;
        include snippets/proxy.conf;
        proxy_pass http://vaultwarden;
    }

    # ---- WebSocket live-sync ----
    location /notifications/hub {
        include snippets/proxy.conf;
        proxy_pass http://vaultwarden;
    }
    location /notifications/hub/negotiate {
        include snippets/proxy.conf;
        proxy_pass http://vaultwarden;
    }

    # ---- API login throttle (credential stuffing) ----
    location ~ ^/identity/connect/token {
        limit_req zone=vw_login burst=10 nodelay;
        include snippets/proxy.conf;
        proxy_pass http://vaultwarden;
    }

    # ---- everything else ----
    location / {
        include snippets/proxy.conf;
        proxy_pass http://vaultwarden;
    }
}
