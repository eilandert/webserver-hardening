# =============================================================================
# ssl.conf  —  TLS hardening shared across all HTTPS vhosts.
#
#   include snippets/ssl.conf;
#
# Place inside a `server { listen 443 ssl; http2 on; ... }` block (or in `http`
# for the parts that are valid there). Set ssl_certificate / ssl_certificate_key
# in the vhost itself — only the policy lives here.
#
# Tuned for the hardened nginx/Angie + openssl-nginx stack from
# https://deb.myguard.nl/ (HTTP/3, dynamic TLS records, certificate
# compression). Directives that need an extra module/patch are noted inline;
# they are no-ops on a vanilla build, so this file is safe to include anywhere.
# =============================================================================

# ---- Protocols & ciphers ----------------------------------------------------
# TLS 1.2 + 1.3 only. 1.0/1.1 are dead (PCI, RFC 8996). 1.3 ciphers are not
# configurable here (the suite is fixed by the RFC); the list below is the
# 1.2 fallback — all forward-secret AEAD, no CBC, no RSA-kx.
ssl_protocols              TLSv1.2 TLSv1.3;
ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;     # let TLS 1.3 / modern clients pick; avoids forcing a weaker order
ssl_ecdh_curve            X25519:secp384r1:prime256v1;

# TLS 1.3 0-RTT: OFF. Early data is replayable — only enable per-vhost for
# endpoints you have proven idempotent.
ssl_early_data            off;

# ---- Session resumption -----------------------------------------------------
# Shared cache is fine; tickets OFF — ticket keys, unless rotated, break PFS for
# resumed sessions (a stolen key decrypts past traffic). With tickets off,
# resumption uses the (forward-secret) session cache only.
ssl_session_cache         shared:SSL:10m;
ssl_session_timeout       1d;
ssl_session_tickets       off;

# ---- OCSP stapling ----------------------------------------------------------
# Staple the CA's OCSP response so clients don't phone the CA (privacy + speed).
# Needs a resolver to fetch the responder and a chain that includes the issuer.
ssl_stapling              on;
ssl_stapling_verify       on;
# resolver 127.0.0.1 valid=300s ipv6=off;   # set to a real resolver in http{}
# resolver_timeout 5s;

# ---- Dynamic TLS records  (needs nginx_dynamic_tls_records.patch) -----------
# Send small TLS records first (fast first paint, no head-of-line stall on the
# initial round trips), then grow to ~16 KB for bulk throughput. No-op without
# the patch — see ../patches/nginx_dynamic_tls_records.patch.
ssl_dyn_rec_enable        on;
# ssl_dyn_rec_size_lo     1369;   # ~1 IP packet incl. TLS overhead
# ssl_dyn_rec_size_hi     4229;
# ssl_dyn_rec_threshold   40;
# ssl_dyn_rec_timeout     1000ms;

# ---- Certificate compression  (needs ssl-cert-compression.patch + ----------
#       openssl-nginx built with enable-brotli/enable-zstd) -------------------
# RFC 8879: compress the server certificate chain in the handshake. Cuts bytes
# on the wire on every full handshake. brotli is preferred, zlib is the
# universal fallback. The chain is compressed once at startup and cached, so
# there is no per-handshake CPU cost. See ../patches/ssl-cert-compression.patch.
ssl_certificate_compression               on;
ssl_certificate_compression_algorithms    brotli zlib zstd;

# ---- HSTS -------------------------------------------------------------------
# Force HTTPS for 2 years, including subdomains, preload-eligible. Only enable
# once EVERY subdomain is HTTPS-only — preload is hard to undo. `always` so it
# is emitted on error responses too. (Kept here so it survives behind a proxy
# when this is the TLS terminator; if you terminate TLS upstream, set it there.)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
