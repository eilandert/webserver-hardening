# =============================================================================
# deny-common.conf  —  block paths nothing legitimate should ever request.
#
#   include snippets/deny-common.conf;   # inside server{}
#
# Defence in depth: even if the filesystem layout already hides these, denying
# them at the edge stops the probes from reaching PHP/the app at all. ACME is
# explicitly preserved.
# =============================================================================

# Always let ACME http-01 through (must come before the dotfile deny).
location ^~ /.well-known/acme-challenge/ {
    allow all;
    default_type "text/plain";
}

# Dotfiles & VCS metadata (.git, .env, .htaccess, .ssh, …) — except .well-known.
location ~ /\.(?!well-known/) { deny all; }

# Source / config / schema / backup / editor-swap files that may ride inside a
# served tree.
location ~* \.(?:bak|old|orig|save|swp|swo|tmp|dist|sample|sql|sqlite|db|log|inc|ini|conf|cfg|env|key|pem|crt|p12|pfx|sh|twig|tpl|yml|yaml|lock)$ { deny all; }

# Dependency / build manifests.
location ~* (?:^|/)(?:composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock|Gruntfile\.js|Dockerfile|Makefile|webpack\.config\.js)$ { deny all; }

# Project docs that leak version/structure.
location ~* (?:^|/)(?:README|INSTALL|LICENSE|CHANGELOG|UPGRADING|SECURITY|CONTRIBUTING|AUTHORS|NOTICE)(?:\.(?:md|txt|rst))?$ { deny all; }

# Common dependency/internal trees (override per app if a real path collides).
location ~* ^/(?:vendor|node_modules|tests?|\.github|bin)/ { deny all; }
