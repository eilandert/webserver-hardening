# =============================================================================
# vhost-roundcube.conf  —  hardened TLS vhost for Roundcube webmail (1.6/1.7).
#
# Front controller only: execute index.php (+ static.php in 1.7) and refuse
# every other *.php, so a dropped webshell in program/ or plugins/ can't run.
# Login POSTs are rate-limited; scanners/empty-UA are dropped at the door.
#
# Pairs with the Roundcube image: docker.io/eilandert/roundcube
# (source: https://github.com/eilandert/dockerized — src/roundcube/).
#
# --- http{} prerequisites (see snippets/bad-bots.conf, realip.conf) ----------
#   include snippets/realip.conf;     # defines $connection_upgrade + real_ip
#   include snippets/bad-bots.conf;   # defines $hardening_bad_ua / _uri
#   # login-throttle: only login POSTs consume the budget (empty key = uncounted)
#   map $arg__action $rc_login_key { default ""; "login" $binary_remote_addr; }
#   limit_req_zone $rc_login_key zone=rc_login:10m rate=12r/m;
#   limit_req_status 429;
#   upstream rc_php { server unix:/run/php/roundcube-fpm.sock; }
# =============================================================================

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mail.example.com;          # <-- your domain

    ssl_certificate     /etc/letsencrypt/live/mail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.com/privkey.pem;
    include snippets/ssl.conf;

    root  /var/www/roundcube/public_html;  # 1.7: only index.php + static.php live here
    index index.php;
    autoindex off;

    client_max_body_size    25m;           # keep in step with PHP post_max_size
    client_body_buffer_size 256k;

    # BREACH: Roundcube serves CSRF tokens in dynamic HTML — do NOT gzip it.
    gzip off;

    include snippets/security-headers.conf;
    # Roundcube's Elastic skin needs inline script/style; override the strict CSP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' blob:; connect-src 'self'; form-action 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;

    # Cheapest denials first.
    if ($hardening_bad_ua)  { return 444; }
    if ($hardening_bad_uri) { return 444; }

    include snippets/deny-common.conf;

    # Roundcube installer is reachable in 1.7 if present — never run it.
    location = /installer.php { deny all; }
    location ^~ /installer    { deny all; }
    # Out-of-docroot trees (belt-and-braces; filesystem already hides them).
    location ~ ^/(config|temp|logs|SQL|bin|vendor)(/|$) { deny all; }
    location ~ ^/program/(include|lib|localization|actions|steps)/ { deny all; }

    # 1.7 static asset dispatcher (PATH_INFO) — must win over the static regex.
    location ^~ /static.php {
        include snippets/php-fpm.conf;
        fastcgi_split_path_info ^(/static\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root/static.php;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_pass  rc_php;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~* \.(avif|jpe?g|gif|png|webp|svg|woff2?|ttf|eot|css|js|ico)$ {
        access_log off; log_not_found off;
        expires 30d; add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ /index.php$is_args$args; }

    # Front controller — login POSTs throttled (burst absorbs human retries).
    location = /index.php {
        limit_req zone=rc_login burst=8 nodelay;
        include snippets/php-fpm.conf;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_pass  rc_php;
    }

    # Any other *.php (dropped shell, program/steps/*.php over HTTP): refuse.
    location ~ \.php$ { return 404; }
}
