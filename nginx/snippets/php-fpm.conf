# =============================================================================
# php-fpm.conf  —  safe FastCGI defaults for a PHP front-controller app.
#
#   location = /index.php {
#       include snippets/php-fpm.conf;
#       fastcgi_pass php-fpm;          # define the upstream in the vhost
#   }
#
# Only execute the front controller you name; refuse every other *.php so a
# dropped/uploaded webshell cannot run. See the example vhosts for the full
# "front controller + deny other .php" pattern.
# =============================================================================

include              fastcgi_params;

# SCRIPT_FILENAME must be built from $document_root + the real script — NOT from
# $fastcgi_script_name on arbitrary input, which enables path traversal.
fastcgi_param        SCRIPT_FILENAME  $document_root$fastcgi_script_name;
fastcgi_index        index.php;

# Strip PATH_INFO foot-guns: do NOT set cgi.fix_pathinfo=1 in php.ini.
# (handled in php.ini, noted here so it isn't forgotten).

# Hide upstream fingerprints.
fastcgi_hide_header  X-Powered-By;
fastcgi_hide_header  X-Pingback;

# Buffers / timeouts — sane for app traffic; raise read_timeout for long jobs.
fastcgi_read_timeout 120s;
fastcgi_buffers      16 16k;
fastcgi_buffer_size  32k;
fastcgi_intercept_errors on;

# Pass the real scheme/port so the app builds correct absolute URLs behind TLS.
fastcgi_param        HTTPS            $https if_not_empty;
fastcgi_param        REQUEST_SCHEME   $scheme;
